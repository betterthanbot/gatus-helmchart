{{- if .Values.discovery.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gatus.discoveryServiceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
  {{- with .Values.discovery.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gatus.fullname" . }}-discovery-cluster-role
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps", "apps.openshift.io"]
    resources: ["deployments", "deploymentconfigs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gatus.fullname" . }}-discovery-cluster-binding
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gatus.discoveryServiceAccountName" . }}
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "gatus.fullname" . }}-discovery-cluster-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gatus.fullname" . }}-manager-role
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gatus.fullname" . }}-manager-binding
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gatus.discoveryServiceAccountName" . }}
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "gatus.fullname" . }}-manager-role
{{- end }}
