{{- if .Values.discovery.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gatus.fullname" . }}-discovery-script
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
data:
  discover.sh: |
    #!/bin/bash
    set -e

    NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
    CONFIG_FILE="/tmp/gatus-config-data.yaml"
    INVALID_LOG="/tmp/gatus-skipped.log"
    GATUS_DEPLOYMENT={{ include "gatus.fullname" . }}
    GATUS_CONFIGMAP={{ include "gatus.configMapName" . }}

    SKIPPED=0
    ROUTES_ADDED=0
    PROBES_ADDED=0

    echo "============================================================"
    echo " Gatus Discovery"
    echo " Namespace : $NAMESPACE"
    echo " Target CM : $GATUS_CONFIGMAP"
    echo " Deployment: $GATUS_DEPLOYMENT"
    echo "============================================================"

    > $INVALID_LOG

    # Write the Gatus config.yaml content directly to its own file.
    # Keeping it separate avoids fragile awk extraction later.
    cat > $CONFIG_FILE << 'CONFIG_EOF'
    ui:
      title: {{ .Values.gatus.ui.title | quote }}
      header: {{ .Values.gatus.ui.header | quote }}
      description: {{ .Values.gatus.ui.description | quote }}
      logo: {{ .Values.gatus.ui.logo | quote }}
      theme: {{ .Values.gatus.ui.theme | quote }}

    storage:
      type: {{ .Values.gatus.storage.type }}
      path: {{ .Values.gatus.storage.path }}

    endpoints:
    CONFIG_EOF

    {{- if .Values.discovery.scrapeRoutes }}
    echo ""
    echo "[Routes] Scraping all namespaces..."
    ROUTE_JSON=$(oc get route --all-namespaces -o json)

    {{- if .Values.discovery.excludeNamespaces }}
    ROUTE_JSON=$(echo "$ROUTE_JSON" | jq '[.items[] | select(.metadata.namespace | test("^({{ join "|" .Values.discovery.excludeNamespaces }})$") | not)] | {items: .}')
    {{- end }}

    ROUTES_BLOCK=$(echo "$ROUTE_JSON" | jq -r '
      .items[] |
      select(.spec.host != null and .spec.host != "") |
      "      - name: \"\(.metadata.name) (Route)\"\n" +
      "        group: \"\(.metadata.namespace)\"\n" +
      "        url: \"\(if .spec.tls != null then "https" else "http" end)://\(.spec.host)\(if .spec.path != null and .spec.path != "" then .spec.path else "" end)\"\n" +
      "        interval: {{ .Values.gatus.endpointDefaults.interval }}\n" +
      "        client:\n" +
      "          insecure: {{ .Values.discovery.insecureSkipTLSVerify }}\n" +
      "        conditions:\n" +
      {{- range .Values.gatus.endpointDefaults.conditions }}
      "          - \"{{ . }}\"\n" +
      {{- end }}
      ""
    ')
    echo "$ROUTES_BLOCK" >> $CONFIG_FILE
    ROUTES_ADDED=$(echo "$ROUTES_BLOCK" | grep -c "^      - name:" || true)

    SKIPPED_ROUTES=$(echo "$ROUTE_JSON" | jq -r '
      .items[] | select(.spec.host == null or .spec.host == "") |
      "  SKIP (no host): \(.metadata.namespace)/\(.metadata.name)"
    ')
    [ -n "$SKIPPED_ROUTES" ] && echo "$SKIPPED_ROUTES" >> $INVALID_LOG
    echo "[Routes] Added: $ROUTES_ADDED"
    {{- end }}

    {{- if .Values.discovery.scrapeDeployments }}
    echo ""
    echo "[Probes] Scraping deployment readinessProbes..."
    DEPLOY_JSON=$(oc get deployment --all-namespaces -o json)

    # IMPORTANT: Only include numeric ports.
    # Named ports (e.g. "healthcheck", "liveness-port", "http") cannot be used
    # in a URL and cause Gatus to panic on startup. These are filtered here and
    # also caught again in the pre-patch validation below.
    PROBES_BLOCK=$(echo "$DEPLOY_JSON" | jq -r '
      .items[] |
      .metadata.namespace as $ns |
      .metadata.name as $app |
      .spec.template.spec.containers[]? |
      select(.readinessProbe.httpGet != null) |
      select((.readinessProbe.httpGet.port | tostring) | test("^[0-9]+$")) |
      .readinessProbe.httpGet as $probe |
      (if $probe.scheme then ($probe.scheme | ascii_downcase) else "http" end) as $scheme |
      ($probe.path | if (. == null or . == "") then "/" elif startswith("/") then . else "/"+. end) as $path |
      "      - name: \"\($app) (\(.name) Probe)\"\n" +
      "        group: \"\($ns)\"\n" +
      "        url: \"\($scheme)://\($app).\($ns).svc.cluster.local:\($probe.port)\($path)\"\n" +
      "        interval: {{ .Values.gatus.endpointDefaults.interval }}\n" +
      "        conditions:\n" +
      {{- range .Values.gatus.endpointDefaults.conditions }}
      "          - \"{{ . }}\"\n" +
      {{- end }}
      ""
    ')
    echo "$PROBES_BLOCK" >> $CONFIG_FILE
    PROBES_ADDED=$(echo "$PROBES_BLOCK" | grep -c "^      - name:" || true)

    SKIPPED_PROBES=$(echo "$DEPLOY_JSON" | jq -r '
      .items[] |
      .metadata.namespace as $ns |
      .metadata.name as $app |
      .spec.template.spec.containers[]? |
      select(.readinessProbe.httpGet != null) |
      select((.readinessProbe.httpGet.port | tostring) | test("^[0-9]+$") | not) |
      "  SKIP (named port \"\(.readinessProbe.httpGet.port)\"): \($ns)/\($app)/\(.name)"
    ')
    [ -n "$SKIPPED_PROBES" ] && echo "$SKIPPED_PROBES" >> $INVALID_LOG
    echo "[Probes] Added: $PROBES_ADDED"
    {{- end }}

    # Skipped summary
    SKIPPED=$(wc -l < $INVALID_LOG | tr -d ' ')
    echo ""
    if [ "$SKIPPED" -gt 0 ]; then
      echo "------------------------------------------------------------"
      echo " Skipped endpoints ($SKIPPED) — named/invalid ports excluded:"
      cat $INVALID_LOG
      echo "------------------------------------------------------------"
    else
      echo "[Validation] No endpoints skipped."
    fi

    # Safety net: catch any named-port URL that slipped through before patching
    echo ""
    echo "[Validation] Checking for invalid port patterns in generated config..."
    INVALID_URLS=$(grep -E 'url:.*svc\.cluster\.local:([a-zA-Z]|[0-9]+[a-zA-Z])' $CONFIG_FILE || true)
    if [ -n "$INVALID_URLS" ]; then
      echo "ERROR: Named-port URLs detected — these would cause Gatus to panic:"
      echo "$INVALID_URLS"
      echo "Aborting — ConfigMap will NOT be updated."
      exit 1
    fi
    echo "[Validation] All URLs are valid."

    # Verify the config file has actual content before patching
    ENDPOINT_COUNT=$(grep -c "^      - name:" $CONFIG_FILE || true)
    if [ "$ENDPOINT_COUNT" -eq 0 ]; then
      echo "ERROR: No endpoints were generated. Aborting to avoid pushing an empty config."
      exit 1
    fi
    echo "[Validation] Endpoint count in generated config: $ENDPOINT_COUNT"

    # Patch only the data key — Helm retains ownership of the ConfigMap object
    echo ""
    echo "[ConfigMap] Patching ${GATUS_CONFIGMAP}..."
    CONFIG_JSON=$(jq -Rs . < $CONFIG_FILE)
    oc patch configmap ${GATUS_CONFIGMAP} -n $NAMESPACE \
      --type=merge \
      --patch "{\"data\":{\"config.yaml\":${CONFIG_JSON}}}"

    # Verify the patch actually landed
    echo "[ConfigMap] Verifying patch..."
    PATCHED_LINES=$(oc get configmap ${GATUS_CONFIGMAP} -n $NAMESPACE \
      -o jsonpath='{.data.config\.yaml}' | wc -l | tr -d ' ')
    if [ "$PATCHED_LINES" -lt 5 ]; then
      echo "ERROR: ConfigMap config.yaml appears empty after patch ($PATCHED_LINES lines). Aborting rollout."
      exit 1
    fi
    echo "[ConfigMap] Verified — ${PATCHED_LINES} lines written to config.yaml."

    {{- if .Values.discovery.restartOnUpdate }}
    echo ""
    echo "[Rollout] Restarting ${GATUS_DEPLOYMENT}..."
    oc rollout restart deployment/${GATUS_DEPLOYMENT} -n $NAMESPACE

    echo "[Rollout] Waiting for rollout (timeout: {{ .Values.discovery.rolloutTimeout }})..."
    if ! oc rollout status deployment/${GATUS_DEPLOYMENT} -n $NAMESPACE --timeout={{ .Values.discovery.rolloutTimeout }}; then
      echo ""
      echo "============================================================"
      echo " ERROR: Rollout failed!"
      echo "============================================================"
      echo ""
      echo "[Debug] Deployment events:"
      oc describe deployment/${GATUS_DEPLOYMENT} -n $NAMESPACE | grep -A 20 "^Events:"
      echo ""
      echo "[Debug] Pod status:"
      oc get pods -n $NAMESPACE -l app.kubernetes.io/name={{ include "gatus.name" . }} -o wide
      echo ""
      echo "[Debug] Pod logs (last 50 lines from non-running pods):"
      for POD in $(oc get pods -n $NAMESPACE -l app.kubernetes.io/name={{ include "gatus.name" . }} \
            --field-selector=status.phase!=Running -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
        echo "--- Logs: $POD ---"
        oc logs $POD -n $NAMESPACE --previous --tail=50 2>/dev/null || \
          oc logs $POD -n $NAMESPACE --tail=50 2>/dev/null || \
          echo "(no logs available)"
      done
      echo ""
      echo "[Debug] Pod describe (first failing pod):"
      FIRST_BAD=$(oc get pods -n $NAMESPACE -l app.kubernetes.io/name={{ include "gatus.name" . }} \
        --field-selector=status.phase!=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
      [ -n "$FIRST_BAD" ] && oc describe pod/$FIRST_BAD -n $NAMESPACE
      exit 1
    fi
    echo "[Rollout] Deployment is healthy."
    {{- end }}

    echo ""
    echo "============================================================"
    echo " Discovery complete!"
    echo " Routes added : $ROUTES_ADDED"
    echo " Probes added : $PROBES_ADDED"
    echo " Skipped      : $SKIPPED"
    echo "============================================================"
{{- end }}