# ==============================================================================
# Gatus Helm Chart – values.yaml
# All fields are overridable. Override per-environment with -f overrides.yaml.
# ==============================================================================

# ------------------------------------------------------------------------------
# Global metadata
# ------------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

namespace: gatus

commonLabels: {}
commonAnnotations: {}

# ------------------------------------------------------------------------------
# Image
# ------------------------------------------------------------------------------
image:
  repository: quay.io/rhn-support-gong/gatus
  tag: 1.0.2
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ------------------------------------------------------------------------------
# Deployment
# ------------------------------------------------------------------------------
replicaCount: 1

strategy:
  type: Recreate   # Recreate is required when using ReadWriteOnce PVC

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
#  runAsNonRoot: true
#  runAsUser: 65534

containerSecurityContext: {}
#  allowPrivilegeEscalation: false
#  readOnlyRootFilesystem: true

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "500m"

# Liveness / readiness probes (optional – Gatus exposes /health on port 8080)
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# Extra environment variables injected into the container
extraEnv: []
# - name: GATUS_LOG_LEVEL
#   value: "info"

# Extra volume mounts (e.g. TLS certs, extra secrets)
extraVolumeMounts: []
extraVolumes: []

# ------------------------------------------------------------------------------
# Service
# ------------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

# ------------------------------------------------------------------------------
# Persistent Volume Claim
# ------------------------------------------------------------------------------
persistence:
  enabled: true
  storageClassName: ""      # Leave empty to use the cluster default StorageClass
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  annotations: {}
  # Provide an existing PVC name to skip creation
  existingClaim: ""

# ------------------------------------------------------------------------------
# OpenShift Route
# ------------------------------------------------------------------------------
route:
  enabled: true
  host: ""   # Leave empty to let OpenShift auto-assign (recommended for portability)
  path: ""
  tls:
    enabled: true
    termination: edge       # edge | reencrypt | passthrough
    insecureEdgeTerminationPolicy: Redirect   # Allow | Redirect | None
  annotations: {}
  labels: {}

# Ingress (standard Kubernetes – use instead of route on vanilla K8s)
ingress:
  enabled: false
  className: ""
  annotations: {}
  #   kubernetes.io/ingress.class: nginx
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: gatus.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: gatus-tls
  #    hosts:
  #      - gatus.example.com

# ------------------------------------------------------------------------------
# Service Account
# ------------------------------------------------------------------------------
serviceAccount:
  create: false
  name: ""
  annotations: {}

# ------------------------------------------------------------------------------
# Gatus application configuration
# All values here are rendered into the ConfigMap as config.yaml
# ------------------------------------------------------------------------------
gatus:
  # ------------ UI ------------
  ui:
    title: "Platform Status Dashboard"
    header: "API, Route & Internal Probe Health"
    description: "Real-time health status of OpenShift services and internal microservices"
    logo: "https://upload.wikimedia.org/wikipedia/commons/3/3a/OpenShift-LogoType.svg"
    theme: "dark"    # dark | light

  # ------------ Storage -------
  storage:
    type: sqlite     # sqlite | postgres | memory
    path: /data/gatus.db
    # For postgres:
    # type: postgres
    # path: "postgres://user:password@host:5432/gatus?sslmode=disable"

  # ------------ Alerting (disabled by default – uncomment to enable) ----------
  # alerting:
  #   slack:
  #     webhook-url: "https://hooks.slack.com/services/..."
  #     default-alert:
  #       enabled: true
  #       failure-threshold: 3
  #       success-threshold: 1
  #       send-on-resolved: true
  #   pagerduty:
  #     integration-key: "..."
  #   email:
  #     from: gatus@example.com
  #     username: gatus@example.com
  #     password: secret
  #     host: smtp.example.com
  #     port: 587
  #     to: oncall@example.com

  # ------------ Default alert attached to every endpoint (opt-in) -------------
  # Set defaultAlert to {} to disable.
  defaultAlert: {}
  # Example:
  # defaultAlert:
  #   type: slack
  #   failure-threshold: 3
  #   success-threshold: 1
  #   send-on-resolved: true

  # ------------ Endpoint defaults ---------------------------------------------
  # These are merged into each endpoint that does not override them.
  endpointDefaults:
    interval: 1m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] <= 499"

  # ------------ Endpoints -----------------------------------------------------
  # Full list sourced from the original configmap.yaml.
  # Each entry supports all Gatus endpoint fields:
  #   name, group, url, interval, method, body, headers, conditions,
  #   client (insecure, timeout), alerts
  endpoints:

    # ── Example Endpoints ────────────────────────────────────────────────────
    - name: "Example Route Endpoint"
      group: "Example Group"
      url: "https://null"

# ------------------------------------------------------------------------------
# Auto-Discovery CronJob
# When enabled, a CronJob scrapes all OpenShift Routes and Deployment
# readinessProbes cluster-wide and rewrites the Gatus ConfigMap automatically.
# The static `gatus.endpoints` list above is then effectively replaced at
# runtime — disable it or leave it as a seed list for the first boot.
# ------------------------------------------------------------------------------
discovery:
  enabled: false   # Set to true to activate the auto-discovery CronJob

  # Skip x509 TLS verification for all discovered endpoints
  insecureSkipTLSVerify: true

  # Cron schedule — default is every hour on the hour.
  # Examples:
  #   "*/15 * * * *"  – every 15 minutes
  #   "0 */6 * * *"   – every 6 hours
  #   "0 0 * * *"     – once daily at midnight
  schedule: "0 * * * *"

  # What to scrape
  scrapeRoutes: true        # Discover all OpenShift Routes cluster-wide
  scrapeDeployments: false   # Discover readinessProbe httpGet paths from Deployments/DCs

  # Namespaces to skip when scraping (regex-matched, passed to grep -Ev)
  excludeNamespaces: []
  # excludeNamespaces:
  #   - openshift-etcd
  #   - openshift-kube-apiserver

  # Restart Gatus after each config update so the new endpoints are loaded
  restartOnUpdate: true
  rolloutTimeout: "120s"

  # CronJob behaviour
  concurrencyPolicy: Forbid          # Forbid | Allow | Replace
  restartPolicy: OnFailure           # OnFailure | Never
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  activeDeadlineSeconds: 600         # Kill the job if it runs longer than 10 min
  suspend: false                     # Set true to temporarily pause the schedule

  # Container image — needs 'oc' and 'jq' (Red Hat origin-cli ships both)
  image:
    repository: quay.io/rhn-support-gong/gatus-discovery
    tag: 1.0.0
    pullPolicy: IfNotPresent

  # Resource limits for the discovery job pod
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

  # ServiceAccount created for the discovery job
  serviceAccount:
    annotations: {}

  # Pod-level settings for the CronJob pods
  podAnnotations: {}
  podSecurityContext: {}
  containerSecurityContext: {}
  nodeSelector: {}
  tolerations: []
